<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="shortcut icon" href="logo1.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>DISEÑOS Y SOLDADURA RRZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

body {
    margin: 0; 
    font-family: "Montserrat", sans-serif;
    background-color: #ffffff;
}

.header {
    min-height: 100vh;
    box-sizing: border-box;
    background-image: url(header-background.webp);
    display: flex;
    background-size: cover;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.header-overlay {
    height: 100vh;
    width: 100%;
    background-color: #E0B04A55;
    position: absolute;
    z-index: 1;
}

.header-img, h1, .header-descripcion{
    z-index: 10
}

.header-img {
    border-radius: 50%;
    min-width: 16rem;
    max-width: 18rem
}

.nombre {
    font-size: 2rem;
    color: #111111;
}

.header-descripcion {
    color: #000;
    text-align: center;
    font-size: 1.2rem;
    margin: 0 2.5rem;
    text-wrap: pretty;
    font-family: sans-serif;
    font-weight: 500;
}

.navbar {
    box-sizing:border-box;
    background-color: #333333;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-content: center;
    padding: .3rem .6rem;
    gap: 1rem;
    position: sticky;
    top: 0;
}

.logo {
    width: 3rem;
    height: 3rem;
}

.header-flecha {
    z-index: 10;
    position: absolute;
    min-height: 9rem;
    max-height: 11rem;
    max-width: 5rem;
    bottom: 5rem;
}

.titulo-logo {
    display: flex;
    align-items: center;
    gap: .3rem
}

.navbar-links {
    display: flex;
    box-sizing: border-box;
    flex-direction: row;
    justify-content: space-evenly;
    flex-wrap: wrap;
    align-items: center;
    flex-grow: 1;
    flex-basis: 0;
}

.nav-link {
    color: #E0B04A;
    text-decoration: none;
}

.nav-link:first-child {
    margin-right: .2rem;
}

.nav-link:hover {
    color: #E0B04A99;
}

.aside-titulo {
    box-sizing: border-box;
    display: flex;
    justify-content: space-around;
    padding: 2rem 2rem; 
    padding-left: 3rem;
    gap: 1rem
}

.aside-titulo h2 {
    font-size: 1.5rem;
    text-align: center;
}

.titulo-img-1 {
    border-radius: 50%;
    box-shadow: 0 0 3px 0px #000;
    width: 7rem;
}

main {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    grid-template-rows: repeat(2,1fr);
    gap: 2rem;
    padding: 1rem;
}

main img {
    max-width: 100%;
    border-radius: 20px;
    box-shadow: 0 0 20px 0 #000;
}
    </style>
<body>
    <header class="header" id="Inicio">

        </div>
        <img src="logo1.png" alt="" class="header-img">
        <h1 translate="no" lang="en" class="nombre">
            RRZ METALWORKS
        </h1>
        <p class="header-descripcion">
            Cada pieza es fabricada artesanalmente, combinando técnicas de herrería con un diseño moderno para crear productos únicos.
        </p>
        <img src="flecha1.webp" alt="" class="header-flecha">
    </header>
    <div class="navbar">
        <div class="titulo-logo">
            <img src="logo.png" alt="" class="logo">
        </div>
        <nav class="navbar-links">
            <a href="#Inicio" class="nav-link link--inicio">Inicio</a>
            <a href="#catalogo" class="nav-link link--catalogo">Catálogo</a>
            <a href="#" class="nav-link link--contacto">Contacto</a>
        </nav>
    </div>
    <div class="main-wrapper" id="catalogo">
        <aside class="aside-titulo">
            <h2>
                Diseño Artesanal en Metal
            </h2>
            <img src="titulo-img-1.png" alt="" class="titulo-img-1">
        </aside>
        <main>

                </a>
                <a href="">

                </a>
                <a href="">

                </a>
